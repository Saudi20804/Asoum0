<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اسووم</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: 'Arial', sans-serif;
            overflow: hidden; /* عشان الكلام ميعملش سكرول */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #main-btn {
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            background-color: #ff4d6d;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
            z-index: 1000;
            transition: transform 0.2s;
        }

        #main-btn:active {
            transform: scale(0.9);
        }

        .zakri {
            position: absolute;
            font-weight: 900;
            pointer-events: none;
            user-select: none;
            animation: popIn 0.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            100% { transform: scale(1) rotate(var(--rot)); opacity: 1; }
        }
    </style>
</head>
<body>

    <button id="main-btn">دوسي هنا يا اسووم ❤️</button>

    <script>
        const btn = document.getElementById('main-btn');
        const colors = ['#ff4d6d', '#c2185b', '#ff758f', '#a4133c', '#590d22'];

        btn.addEventListener('click', () => {
            // نخفي الزرار أول ما تدوس
            btn.style.display = 'none';

            // نكرر الكلمة 150 مرة في كل حتة
            for (let i = 0; i < 150; i++) {
                setTimeout(() => {
                    createZakri();
                }, i * 30); // الكلمات تظهر ورا بعض بسرعة
            }
        });

        function createZakri() {
            const el = document.createElement('div');
            el.className = 'zakri';
            el.innerText = 'ذاااكري';
            
            // أماكن عشوائية
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            
            // أحجام وزوايا عشوائية
            const size = Math.floor(Math.random() * 30) + 20; // من 20 لـ 50 px
            const rotation = Math.floor(Math.random() * 60) - 30; // زاوية ميل
            const color = colors[Math.floor(Math.random() * colors.length)];

            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.fontSize = size + 'px';
            el.style.color = color;
            el.style.setProperty('--rot', rotation + 'deg');

            document.body.appendChild(el);
        }
    </script>
</body>
</html>
