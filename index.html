<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة لأسماء</title>
    <style>
        body { margin: 0; background: #fff; font-family: 'Arial', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .page { display: none; flex-direction: column; align-items: center; justify-content: center; width: 90%; }
        .active { display: flex; }
        
        h1 { color: #c2185b; margin-bottom: 30px; font-size: 1.8rem; }
        button { padding: 15px 30px; font-size: 1.2rem; font-weight: bold; color: #fff; background-color: #ff4d6d; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s; margin: 10px; }
        button:active { transform: scale(0.9); }
        
        .btn-group { display: flex; gap: 15px; }
        .btn-no { background-color: #888; }

        .zakri-item { position: absolute; font-weight: 900; pointer-events: none; white-space: nowrap; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="page1" class="page active">
        <button onclick="showPage('page2')">دوسي هنا يا اسووم ❤️</button>
    </div>

    <div id="page2" class="page">
        <h1>عايز اقولك علي حاجة مهمه🌚</h1>
        <button onclick="showPage('page3')">دوسي هنا تاني يا اسووم 😉</button>
    </div>

    <div id="page3" class="page">
        <h1>عايزه تعرفي عايز اقولك اي؟؟!!</h1>
        <div class="btn-group">
            <button onclick="startPrank()">ايوا</button>
            <button class="btn-no" onclick="showPage('page4')">لاااا</button>
        </div>
    </div>

    <div id="page4" class="page">
        <h1>ارجعي تاني اختاري (ايوا) 😒</h1>
        <button onclick="showPage('page3')">حاضر 🙄</button>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function startPrank() {
            // إخفاء كل الصفحات
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.body.style.background = '#fff0f3';

            // نظام توزيع الكلمات عشان ميركبوش على بعض
            const rows = Math.floor(window.innerHeight / 50);
            const cols = Math.floor(window.innerWidth / 100);
            let delay = 0;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    setTimeout(() => {
                        const el = document.createElement('div');
                        el.className = 'zakri-item';
                        el.innerText = 'ذاااكري';
                        
                        // حساب المكان بدقة (شبكة منظممة)
                        const x = c * 100 + (Math.random() * 20);
                        const y = r * 50 + (Math.random() * 10);
                        
                        el.style.left = x + 'px';
                        el.style.top = y + 'px';
                        el.style.fontSize = (Math.random() * 10 + 18) + 'px';
                        el.style.color = ['#ff4d6d', '#c2185b', '#a4133c'][Math.floor(Math.random() * 3)];
                        el.style.transform = `rotate(${Math.random() * 20 - 10}deg)`;
                        
                        document.body.appendChild(el);
                    }, delay);
                    delay += 30; // تظهر ورا بعضها بشكل شيك
                }
            }
        }
    </script>
</body>
</html>
